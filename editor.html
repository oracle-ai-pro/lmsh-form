<!DOCTYPE html>
<html lang="ru">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@1" rel="stylesheet">
    <link rel="stylesheet" href="style-editor.css">
</head>
<body>
    <div class="sidebar">
        <span class="material-symbols-rounded icon-btn" onclick="add('text')">text_fields</span>
        <span class="material-symbols-rounded icon-btn" onclick="add('radio')">radio_button_checked</span>
        <span class="material-symbols-rounded icon-btn" onclick="add('checkbox')">check_box</span>
        <span class="material-symbols-rounded icon-btn" onclick="add('section')">splitscreen</span>
    </div>

    <div class="main">
        <div class="header">
            <div class="logo-mini"><div class="dot blue"></div><div class="dot purple"></div></div>
            <h2 contenteditable="true" oninput="currentForm.title = this.innerText">${currentForm.title}</h2>
            <div class="tabs">
                <div class="tab active" onclick="render('builder')">Конструктор</div>
                <div class="tab" onclick="render('responses')">Ответы</div>
                <div class="tab" onclick="render('settings')">Настройки</div>
            </div>
            <button onclick="save()">Сохранить</button>
            <span class="material-symbols-rounded more-btn" onclick="exportIframe()">more_vert</span>
        </div>
        <div class="content" id="app"></div>
    </div>
    <script src="script-editor.js"></script>
</body>
</html>
